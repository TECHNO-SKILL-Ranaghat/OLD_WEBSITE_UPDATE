<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>AIBCE Login</title>

		<!-- Bootstrap 5.3.8 -->
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet">

		<!-- Icons -->
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
			rel="stylesheet">

		<style>
    body {
      background: #f4f7fb;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 30px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    .logo {
      width: 90px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #777;
      margin-bottom: 20px;
    }

    .renewal {
      color: #0d6efd;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .otp-msg {
      color: green;
      font-size: 13px;
      margin-bottom: 15px;
    }

    .input-group-text {
      background: #f1f3f6;
      border: 1px solid #ddd;
    }

    .form-control {
      border: 1px solid #ddd;
      background: #f8f9fa;
    }

    .form-control:focus {
      box-shadow: none;
      border-color: #0d6efd;
      background: #fff;
    }

    .send-otp {
      font-size: 13px;
      color: red;
      cursor: pointer;
      text-align: left;
      margin-top: 5px;
    }

    .btn-login {
      background: linear-gradient(135deg, #6f42c1, #0d6efd);
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-weight: 500;
    }

    .btn-login:hover {
      opacity: 0.9;
    }

    hr {
      margin: 15px 0;
    }

    @media (max-width: 576px) {
      .login-card {
        padding: 20px;
      }
    }
  </style>
	</head>

	<body>

		<div class="login-card">

			<!-- Logo -->
			<img src="./assets/logo.jpeg" class="logo" alt="Logo">

			<hr>

			<p class="subtitle">Login with All India Board of Computer Education</p>

			<p class="renewal">117 Days remaining for renewal !!</p>

			<p class="otp-msg">OTP sent to registered email</p>

			<form id="loginForm">

				<!-- Username -->
				<div class="input-group mb-3">
					<span class="input-group-text"><i class="bi bi-person"></i></span>
					<input type="text" class="form-control" placeholder="Username"
						value="admin" required>
				</div>

				<!-- Password -->
				<div class="input-group mb-3">
					<span class="input-group-text"><i class="bi bi-key"></i></span>
					<input type="password" class="form-control" placeholder="Password"
						required>
				</div>

				<!-- OTP -->
				<div class="mb-2">
					<div class="input-group">
						<span class="input-group-text"><i
								class="bi bi-shield-lock"></i></span>
						<input type="text" class="form-control" placeholder="Enter OTP"
							id="otp">
					</div>
					<div class="send-otp" onclick="sendOTP()">Click here to send OTP</div>
				</div>

				<!-- Button -->
				<button type="submit" class="btn btn-login w-100 mt-3">
					<i class="bi bi-lock"></i> Login
				</button>

			</form>

		</div>

		<!-- JS -->
		<script src="js/main.js"></script>

	</body>
</html>
