<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/studentRegistration.css">
</head>

<body>

    <div class="container my-5 d-flex justify-content-center">
        <form class="form-container">

            <h4 class="text-center mb-3 heading-title">APPLICATION FOR STUDENT REGISTRATION</h4>

            <!-- LOCATION -->
            <h6 class="section-title">CHOOSE LOCATION</h6>
            <div class="row">
                <div class="col-md-6">
                    <div class="input-box">
                        <select required>
                            <option value="" disabled selected></option>
                            <option>State 1</option>
                        </select>
                        <label>State*</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-box">
                        <select required>
                            <option value="" disabled selected></option>
                        </select>
                        <label>District*</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-box">
                        <select required>
                            <option value="" disabled selected></option>
                        </select>
                        <label>Study Centre*</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-box">
                        <input type="text" required>
                        <label>Study Centre Address*</label>
                    </div>
                </div>
            </div>

            <!-- COURSE -->

            <h6 class="section-title">CHOOSE COURSE</h6>
            <div class="row">
                <div class="col-md-6">
                    <div class="input-box">
                        <select required class="rounded-3">
                            <option value="" disabled selected></option>
                            <option class="rounded-3" value="course1">abc</option>
                        </select>
                        <label>Course Category*</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-box">
                        <select required>
                            <option value="" disabled selected></option>
                        </select>
                        <label>Duration*</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-box">
                        <select required>
                            <option value="" disabled selected></option>
                        </select>
                        <label>Course Name*</label>
                    </div>
                </div>
            </div>

            <!-- STUDENT INFO -->
            <h6 class="section-title">ENTER STUDENT INFORMATION</h6>
            <div class="row">

                <div class="col-md-6">
                    <div class="input-box">
                        <input type="text" required>
                        <label>Name*</label>
                    </div>
                </div>


                <div class="col-md-6">
                    <div class="input-box">
                        <input type="text" required>
                        <label>Father's Name*</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-box">
                        <input type="text" required>
                        <label>Mother's Name*</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-box">
                        <input type="text" id="dob" required>
                        <label>Date of Birth*</label>
                        <span class="input-icon"><i class="bi bi-calendar"></i></span>
                    </div>
                </div>




                <div class="col-md-6">
                    <div class="input-box">
                        <select required>
                            <option value="" disabled selected></option>
                            <option>Male</option>
                            <option>Female</option>
                        </select>
                        <label>Gender*</label>
                    </div>
                </div>




                <div class="col-md-6">
                    <div class="input-box">
                        <input type="text" required>
                        <label>Contact Number*</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-box">
                        <select required>
                            <option value="" disabled selected></option>
                        </select>
                        <label>Religion*</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-box">
                        <input type="text" required>
                        <label>WhatsApp Number*</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-box">
                        <select required>
                            <option value="" disabled selected></option>
                        </select>
                        <label>Category*</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-box">
                        <select required>
                            <option value="" disabled selected></option>
                        </select>
                        <label>Marital Status*</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-box">
                        <input type="text" required>
                        <label>Address</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-box">
                        <select required>
                            <option value="" disabled selected></option>
                        </select>
                        <label>Last Educational Qualification*</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-box">
                        <select required>
                            <option value="" disabled selected></option>
                        </select>
                        <label>Enquiry Source*</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-box">
                        <input type="text" required>
                        <label>Pin Code*</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-box">
                        <select required>
                            <option value="" disabled selected></option>
                        </select>
                        <label>Identity Proof*</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="input-box">
                        <input type="text" required>
                        <label>Id Card Number*</label>
                    </div>
                </div>

            </div>

            <!-- DECLARATION -->
            <div class="mt-4">
                <label><input type="checkbox"> I hereby declare that all the above statements are true...</label>
            </div>

            <!-- BUTTON -->
            <div class="text-center mt-4">
                <button class="btn-submit" type="submit">SUBMIT</button>
            </div>

        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="./js/studentRegistration.js"></script>
</body>

</html>
