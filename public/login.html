<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/loginStyle.css" />
  </head>

  <body>
    <div class="login-card">
      <h3 class="text-center mb-4">🔐 Role Login</h3>

      <form id="loginForm">
        <!-- Role Selection -->
        <div class="role-box">
          <input
            type="radio"
            name="role"
            id="student"
            value="student"
            checked
          />
          <label for="student"
            >🎓 <br />
            Student</label
          >

          <input type="radio" name="role" id="admin" value="admin" />
          <label for="admin"
            >🛠 <br />
            Admin</label
          >

          <input type="radio" name="role" id="franchise" value="franchise" />
          <label for="franchise"
            >🏢 <br />
            Franchise</label
          >
        </div>

        <div class="form-group mb-3">
          <input type="email" id="email" required />
          <label for="email">Email Address</label>
        </div>

        <div class="form-group mb-3 password-wrapper">
          <input type="password" id="password" required />
          <label for="password">Password</label>
          <i class="bi bi-eye toggle-password" id="togglePassword"></i>
        </div>

        <!-- Options -->
        <div class="d-flex justify-content-between mb-3">
          <div>
            <input type="checkbox" id="remember" />
            <label for="remember"> Remember</label>
          </div>
          <a href="#" class="textDecoration">Forgot Password</a>
        </div>

        <!-- Button -->
        <button type="submit" class="btn btn-custom w-100 mb-3">Login</button>

        <p class="text-center mb-0">
          New user? <a href="#" class="textDecoration">Register</a>
        </p>
      </form>
    </div>

    <!-- JS -->
    <script src="./js/loginScript.js"></script>
  </body>
</html>
