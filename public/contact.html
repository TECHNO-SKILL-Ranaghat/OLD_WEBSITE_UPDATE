<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/contact.css">
</head>

<body>

    <section class="contact-section py-5">
        <div class="container">
            <div class="row g-4">

                <!-- LEFT FORM -->
                <div class="col-lg-7">
                    <div class="contact-box">
                        <span class="contact-tag fs-4">Contact Us</span>
                        <h2 class="contact-title">Keep in touch</h2>

                        <form class="row g-3 mt-3">

                            <div class="col-md-6">
                                <input type="text" class="form-control custom-input" placeholder="Your name">
                            </div>

                            <div class="col-md-6">
                                <input type="email" class="form-control custom-input" placeholder="Email">
                            </div>

                            <div class="col-md-6">
                                <input type="text" class="form-control custom-input" placeholder="Subject">
                            </div>

                            <div class="col-md-6">
                                <input type="text" class="form-control custom-input" placeholder="Phone">
                            </div>

                            <div class="col-12">
                                <textarea class="form-control custom-input" rows="4" placeholder="Message"></textarea>
                            </div>

                            <div class="col-12">
                                <button class="btn-send">Send</button>
                            </div>

                        </form>
                    </div>
                </div>

                <!-- RIGHT INFO -->
                <div class="col-lg-5">
                    <div class="contact-info h-100 d-flex flex-column justify-content-center gap-4">

                        <div class="info-item d-flex align-items-center">
                            <div class="icon"><i class="bi bi-house"></i></div>
                            <p>2 No. Parkstreet, Near Rathtala Railgate,<br>
                                P.O+P.S-Ranaghat, Dist-Nadia, Pin-741201, West Bengal</p>
                        </div>

                        <div class="info-item d-flex align-items-center">
                            <div class="icon"><i class="bi bi-telephone"></i></div>
                            <p>9933977036</p>
                        </div>

                        <div class="info-item d-flex align-items-center">
                            <div class="icon"><i class="bi bi-envelope"></i></div>
                            <p>helpdesk@aibce.org</p>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </section>
    <script src="./js/contact.js"></script>

</body>

</html>
