<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Franchise Application</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="./css/franchiseApplication.css">
</head>

<body>

    <div class="container py-5 d-flex justify-content-center">
        <form class="form-container">

            <h4 class="text-center heading-title mb-5 fs-3">FRANCHISE APPLICATION</h4>

            <!-- BASIC -->
            <h6 class="section-title fs-5">APPLICATION FORM FOR AFFILIATION</h6>
            <div class="row">

                <div class="col-md-4">
                    <div class="input-box">
                        <select required>
                            <option value="" disabled selected></option>
                            <option>State 1</option>
                        </select>
                        <label>State*</label>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="input-box">
                        <select required>
                            <option value="" disabled selected></option>
                        </select>
                        <label>District*</label>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="input-box">
                        <input type="text" required>
                        <label>City*</label>
                    </div>
                </div>

            </div>

            <!-- INSTITUTE -->
            <h6 class="section-title fs-5">Institute Information</h6>
            <div class="row">

                <div class="col-md-4">
                    <div class="input-box">
                        <input type="text" required>
                        <label>Institute Name*</label>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="input-box">
                        <select required>
                            <option value="" disabled selected></option>
                        </select>
                        <label>Year*</label>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="input-box">
                        <select required>
                            <option value="" disabled selected></option>
                        </select>
                        <label>Status*</label>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="input-box">
                        <input type="text" required>
                        <label>P.O*</label>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="input-box">
                        <input type="text" required>
                        <label>P.S*</label>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="input-box">
                        <input type="text" required>
                        <label>Pin*</label>
                    </div>
                </div>

                <div class="col-12">
                    <div class="input-box">
                        <input type="text" required>
                        <label>Institute Address*</label>
                    </div>
                </div>

            </div>

            <!-- CONTACT -->
            <h6 class="section-title fs-5">Institute Contact</h6>
            <div class="row">

                <div class="col-md-4">
                    <div class="input-box">
                        <input type="text" required>
                        <label>Primary Mobile*</label>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="input-box">
                        <input type="text" required>
                        <label>Alternate Mobile</label>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="input-box">
                        <input type="email" required>
                        <label>Email*</label>
                    </div>
                </div>

            </div>

            <!-- HEAD -->
            <h6 class="section-title fs-5">Centre Head Info</h6>
            <div class="row">

                <div class="col-md-4">
                    <div class="input-box">
                        <input type="text" required>
                        <label>Name*</label>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="input-box">
                        <input type="text" required>
                        <label>Position*</label>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="input-box">
                        <input type="text" required>
                        <label>P.O*</label>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="input-box">
                        <input type="text" required>
                        <label>Address*</label>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="input-box">
                        <input type="text" required>
                        <label>Pin*</label>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="input-box">
                        <input type="text" required>
                        <label>P.S*</label>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="input-box">
                        <input type="text" required>
                        <label>Mobile*</label>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="input-box">
                        <input type="email" required>
                        <label>Email*</label>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="input-box">
                        <input type="text" required>
                        <label>DOB*</label>
                        <span class="input-icon"><i class="bi bi-calendar"></i></span>
                    </div>
                </div>

            </div>

            <!-- DOCUMENTS -->
            <h6 class="section-title fs-5">Documents</h6>
            <div class="row">

                <div class="col-md-6">
                    <input type="file" class="form-control">
                </div>

                <div class="col-md-6">
                    <input type="file" class="form-control">
                </div>

            </div>

            <!-- DECLARATION -->
            <div class="mt-4 small">
                <label>
                    <input type="checkbox"> I hereby declare that all information is correct.
                </label>
            </div>

            <!-- BUTTON -->
            <div class="text-center mt-4">
                <button class="btn-submit">SUBMIT</button>
            </div>

        </form>
    </div>

</body>

</html>
